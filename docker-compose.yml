services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    container_name: microbots-surrealdb
    restart: unless-stopped
    user: root
    ports:
      - "${SURREAL_PORT:-8000}:8000"
    volumes:
      - surrealdb-data:/data
    command:
      - start
      - --log=info
      - --user=${SURREAL_USER:-root}
      - --pass=${SURREAL_PASS:-root}
      - surrealkv:///data/database.db

volumes:
  surrealdb-data:
