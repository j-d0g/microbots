    week: 4
    contradiction_topic: deploy_day_rule

# --- Multi-integration workflow: Linear -> GitHub -> Slack -> Notion ---
multi_integration_workflow:
  - source_id: "adv-linear-cross-intg"
    source_type: linear_ticket
    integration: linear
    title: "MIC-99: Cross-integration deploy pipeline"
    content: |
      Project: Agent Memory
      Assignee: Desmond
      Status: In Progress -> Done
      Description: Implement the full deploy pipeline. Steps:
      1. Create Linear ticket for the release.
      2. Open GitHub PR with the changes.
      3. Post deploy notification to #deployments on Slack.
      4. Update the deploy runbook in Notion.
      PR linked: #99.
    signal_level: curated
    week: 3

  - source_id: "adv-github-cross-intg"
    source_type: github_pr
    integration: github
    title: "PR #99: Deploy pipeline automation"
    content: |
      Bob Kim: LGTM. The Linear ticket MIC-99 is linked.
      Desmond: Thanks! Merging now. Will post to Slack and update Notion runbook.
      Bob Kim: Merged.
    signal_level: high
    week: 3

  - source_id: "adv-slack-cross-intg"
    source_type: slack_thread
    integration: slack
    channel: "#deployments"
    title: "Deploy pipeline shipped"
    content: |
      Desmond: Deploy pipeline (MIC-99, PR #99) is live. Notion runbook updated.
      Alice Chen: Confirmed. All green.
    signal_level: high
    week: 3

  - source_id: "adv-notion-cross-intg"
    source_type: notion_page
    integration: notion
    title: "Deploy Runbook v2"
    content: |
      Updated deploy runbook with full pipeline:
      Linear ticket -> GitHub PR -> Slack notification -> Notion runbook update.
      Linked: MIC-99, PR #99. Approved by Alice Chen.
    signal_level: high
    week: 3

