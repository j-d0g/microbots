# entity resolution, noise suppression, contradiction handling,
# and multi-integration workflow detection.

# --- Two Alices: must NOT merge ---
two_alices:
  - source_id: "adv-slack-alice-park-intro"
    source_type: slack_thread
    integration: slack
    channel: "#general"
    title: "New hire: Alice Park (Design)"
    content: |
      Alice Park: Hey everyone! I'm Alice, just joined the design team.
      Desmond: Welcome Alice! Excited to have you.
      Alice Park: Thanks! My email is alice.park@company.com and I'm @alice-park on Slack.
    signal_level: high
    week: 2
    entity_hint:
      name: Alice Park
      type: person
      aliases: ["@alice-park", "alice.park@company.com"]

  - source_id: "adv-slack-alice-chen-infra"
    source_type: slack_thread
    integration: slack
    channel: "#deployments"
    title: "Alice Chen infra review"
    content: |
      Alice Chen: I reviewed the Terraform changes. LGTM, ship it.
      Desmond: Thanks Alice! Deploying now. CC @alice on the deploy thread.
    signal_level: high
    week: 2

