# --- Contradiction: deploy day rule ---
contradiction:
  - source_id: "adv-slack-deploy-rule-w3"
    source_type: slack_thread
    integration: slack
    channel: "#deployments"
    title: "Deploy cadence discussion (week 3)"
    content: |
      Desmond: New rule: we only deploy to prod on Tuesdays. No exceptions.
      Alice Chen: Makes sense, gives us Monday to prep and Wednesday to monitor.
      Bob Kim: Agreed. Updating the runbook now.
    signal_level: high
    week: 3
    contradiction_topic: deploy_day_rule

  - source_id: "adv-slack-deploy-rule-w4"
    source_type: slack_thread
    integration: slack
    channel: "#deployments"
    title: "Deploy cadence update (week 4)"
    content: |
      Desmond: Actually, we're switching deploys to Thursdays starting next sprint. Tuesday is too tight after standup.
