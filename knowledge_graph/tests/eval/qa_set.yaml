# KAIG-style retrieval QA set — 15 questions, 5 per target.
# Each question has graph-mode and wiki-mode scoring paths.
# scoring_mode: exact_match | set_recall_at_k | free_form_judge

# ---------------------------------------------------------------
# Target 1: next_step (action recommendation / next-step prediction)
# ---------------------------------------------------------------

- id: ns-1
  question: "The user just opened a PR on the microbots repo. What is the standard next step?"
  target: next_step
  expected_answer: "Request review from Bob Kim"
  scoring_mode: free_form_judge
  graph_query_name: skills_all
  graph_query_params: { min_strength: 1 }
  relevant_wiki_paths:
    - memory/skills.md

- id: ns-2
  question: "Before opening a GitHub PR, what must the user create first?"
  target: next_step
  expected_answer: "Linear ticket"
  scoring_mode: exact_match
  graph_query_name: workflows_all
  graph_query_params: {}
  relevant_wiki_paths:
    - memory/workflows.md

- id: ns-3
  question: "The user wants to deploy microbots to production. What steps should happen?"
  target: next_step
  expected_answer:
    - "Post to #deployments before deploying"
    - "Run smoke tests"
    - "Post to #deployments after deploying"
  scoring_mode: set_recall_at_k
  graph_query_name: skills_all
  graph_query_params: { min_strength: 1 }
  relevant_wiki_paths:
    - memory/skills.md
    - memory/workflows.md

- id: ns-4
  question: "What is the standard workflow when a bug is triaged?"
  target: next_step
  expected_answer: "bug_triage_pipeline"
  scoring_mode: free_form_judge
  graph_query_name: workflows_all
  graph_query_params: {}
  relevant_wiki_paths:
    - memory/workflows.md

- id: ns-5
  question: "After merging a PR, what deploy convention must be followed?"
  target: next_step
  expected_answer: "Post to #deployments before and after every production deploy"
  scoring_mode: free_form_judge
  graph_query_name: skills_all
  graph_query_params: { min_strength: 1 }
  relevant_wiki_paths:
    - memory/skills.md
    - memory/workflows.md

