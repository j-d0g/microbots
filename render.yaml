# Render Blueprint for microbots.
#
# Services:
#   1. microbots-app         — public FastAPI: /mcp, /mcp/devin, /api/kg/*, /api/composio/*
#   2. microbot-harness-mcp  — public FastMCP harness server (SSE for the demo agent UI)
#   3. microbot-harness-frontend — minimal Next.js harness demo UI (web/ deploys to Vercel separately)
#
# SurrealDB lives on a separate Render service David provisioned:
#   wss://surrealdb-latest-i2nj.onrender.com/rpc  (root/root, ns=microbots, db=memory)
#
# Workflows services aren't yet supported in render.yaml (beta);
# the Workflows service `microbots` is provisioned manually via the Dashboard.

services:
  # ---------- Unified FastAPI app (KG MCP + REST + Composio OAuth) ----------
  - type: web
    name: microbots-app
    runtime: python
    plan: starter
    repo: https://github.com/j-d0g/microbots
    buildCommand: pip install -r app/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SURREAL_URL
        value: wss://surrealdb-latest-i2nj.onrender.com/rpc
      - key: SURREAL_USER
        value: root
      - key: SURREAL_PASS
        value: root
      - key: SURREAL_NS
        value: microbots
      - key: SURREAL_DB
        value: memory
      - key: COMPOSIO_API_KEY
        sync: false       # set in dashboard
      - key: COMPOSIO_USER_ID
        sync: false       # set in dashboard

  # ---------- MCP server (Python, FastMCP, SSE) for the harness agent ----------
  - type: web
    name: microbot-harness-mcp
    runtime: python
    plan: free
    repo: https://github.com/j-d0g/microbots
    rootDir: agent/harness/mcp
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: MCP_API_TOKEN
        generateValue: true
      - key: PORT
        value: "10000"
      - key: RENDER_API_KEY
        sync: false       # required so MCP can call Workflows
      # Point the harness at the unified app's MCP transport.
      - key: KG_MCP_URL
        value: https://microbots-app.onrender.com/mcp

  # ---------- Minimal harness demo UI (web/ goes to Vercel separately) ----------
  - type: web
    name: microbot-harness-frontend
    runtime: node
    plan: starter
    repo: https://github.com/j-d0g/microbots
    rootDir: agent/harness/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: MCP_URL
        value: https://microbot-harness-mcp.onrender.com/sse
      - key: MCP_API_TOKEN
        fromService:
          type: web
          name: microbot-harness-mcp
          envVarKey: MCP_API_TOKEN
      - key: ANTHROPIC_API_KEY
        sync: false       # set in dashboard
